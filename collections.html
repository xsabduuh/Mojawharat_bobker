<!DOCTYPE html>
<html lang="ar">
<head>...</head>
<body>
    <header> (نفس الهيدر) </header>
    <main>
        <div class="container">
            <div class="page-header"><h1>مجموعاتنا</h1></div>
            <div class="products-grid" id="productsGrid">
                <!-- نسخ نفس المنتجات من index.html مع إضافة data-category -->
            </div>
        </div>
    </main>
    <footer>...</footer>
    <script src="cart.js"></script>
    <script>
        // فلترة حسب ?category=
        const params = new URLSearchParams(location.search);
        const cat = params.get('category');
        if(cat) {
            document.querySelectorAll('.product-card').forEach(card => {
                if(!card.dataset.category.includes(cat)) card.style.display = 'none';
            });
        }
    </script>
</body>
</html>
